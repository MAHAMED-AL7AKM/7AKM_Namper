<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO -->
    <title>7AKM Number | حاكم نمبر - منصة بيع وشراء الأرقام الافتراضية</title>
    <meta name="description" content="7AKM Number (حاكم نمبر) منصة متخصصة في بيع وشراء وتبديل الأرقام الافتراضية لجميع المنصات: واتساب، تليجرام، تيك توك.">
    <meta name="keywords" content="7AKM Number, حاكم نمبر, ارقام واتساب, ارقام تليجرام, ارقام تيك توك, بيع ارقام, شراء ارقام">
    <meta name="author" content="7AKM Number">
    
    <!-- Open Graph -->
    <meta property="og:title" content="7AKM Number | حاكم نمبر">
    <meta property="og:description" content="منصة بيع وشراء وتبديل الأرقام الافتراضية">
    <meta property="og:url" content="https://MAHAMED-AL7AKM.github.io/7AKM_Numbers">
    
    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <!-- Tailwind & Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<!-- شريط التنقل -->
<nav class="gradient-bg text-white shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="#" onclick="showPage('home')" class="text-2xl font-bold flex items-center gap-2">
            <i class="fas fa-crown text-yellow-300"></i> 7AKM Number
        </a>
        
        <!-- روابط ثابتة للدخول والتسجيل (تظهر دائماً) -->
        <div class="flex items-center gap-4">
            <!-- روابط التنقل الديناميكية (تملأها JavaScript) -->
            <div id="navLinks" class="flex gap-3"></div>
            
            <!-- روابط المستخدم (تملأها JavaScript) -->
            <div id="userInfo" class="flex items-center gap-3">
                <!-- روابط احتياطية في حال فشل JavaScript -->
                <a href="#" onclick="showPage('login')" class="hover:text-yellow-300 transition">
                    <i class="fas fa-sign-in-alt ml-1"></i> دخول
                </a>
                <a href="#" onclick="showPage('register')" class="hover:text-yellow-300 transition">
                    <i class="fas fa-user-plus ml-1"></i> تسجيل
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- الصفحات (مختصر للتركيز على روابط الدخول) -->
<main class="container mx-auto px-4 py-6">
    <!-- الصفحة الرئيسية -->
    <div id="homePage" class="page active">
        <div class="gradient-bg text-white rounded-2xl shadow-xl p-8 mb-8 text-center">
            <h1 class="text-4xl font-bold mb-4">مرحباً بك في <span class="text-yellow-300">7AKM Number</span></h1>
            <p class="text-xl">منصة حاكم نمبر لبيع وشراء الأرقام الافتراضية</p>
        </div>
        
        <!-- يمكنك إضافة المحتوى هنا لاحقاً -->
        <p class="text-center text-gray-600">لتجربة الموقع، يرجى <a href="#" onclick="showPage('login')" class="text-indigo-600 font-semibold">تسجيل الدخول</a> أو <a href="#" onclick="showPage('register')" class="text-indigo-600 font-semibold">التسجيل</a>.</p>
    </div>

    <!-- صفحة تسجيل الدخول -->
    <div id="loginPage" class="page max-w-md mx-auto bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">تسجيل الدخول</h2>
        <div id="loginError" class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 hidden"></div>
        <form onsubmit="login(event)">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-lg mb-4" required>
            <input type="password" id="loginPassword" placeholder="كلمة المرور" class="w-full p-3 border rounded-lg mb-6" required>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700">دخول</button>
        </form>
        <p class="mt-4 text-center"><a href="#" onclick="showPage('register')" class="text-indigo-600">ليس لديك حساب؟ سجل الآن</a></p>
    </div>

    <!-- صفحة التسجيل -->
    <div id="registerPage" class="page max-w-md mx-auto bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">إنشاء حساب جديد</h2>
        <div id="registerError" class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 hidden"></div>
        <form onsubmit="register(event)">
            <input type="text" id="regName" placeholder="الاسم الكامل" class="w-full p-3 border rounded-lg mb-4" required>
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-lg mb-4" required>
            <input type="password" id="regPassword" placeholder="كلمة المرور" class="w-full p-3 border rounded-lg mb-4" required>
            <input type="tel" id="regPhone" placeholder="رقم التواصل" class="w-full p-3 border rounded-lg mb-6" required>
            <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700">تسجيل</button>
        </form>
        <p class="mt-4 text-center"><a href="#" onclick="showPage('login')" class="text-indigo-600">لديك حساب؟ سجل دخول</a></p>
    </div>

    <!-- باقي الصفحات (مختصرة) -->
    <!-- ... (يمكن إضافتها لاحقاً) ... -->
</main>

<script>
    // تهيئة Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAZIdGz-GWzEKfAaLu2mEqle54NpJE7lmg",
        authDomain: "akmnumbers.firebaseapp.com",
        projectId: "akmnumbers",
        storageBucket: "akmnumbers.firebasestorage.app",
        messagingSenderId: "600674602065",
        appId: "1:600674602065:web:2ffc145b783190672e7c70"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // بيانات المالك
    const OWNER_EMAIL = "mohamed_el7akm@akmnumbers.com";
    const OWNER_PASSWORD = "G7#vQ2mL9@xT4pZ!cR8yH3wD";

    // إظهار الصفحات
    function showPage(pageName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageName + 'Page').classList.add('active');
    }

    // تسجيل الدخول
    async function login(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
            showPage('home');
        } catch (error) {
            if (error.code === 'auth/user-not-found' && email === OWNER_EMAIL && password === OWNER_PASSWORD) {
                // إنشاء حساب المالك
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(userCredential.user.uid).set({
                    name: 'Mohamed El7akm', email, role: 'admin', createdAt: new Date()
                });
                showPage('home');
            } else {
                document.getElementById('loginError').innerText = error.message;
                document.getElementById('loginError').classList.remove('hidden');
            }
        }
    }

    // تسجيل مستخدم عادي
    async function register(e) {
        e.preventDefault();
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const phone = document.getElementById('regPhone').value;
        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('users').doc(userCredential.user.uid).set({
                name, email, phone, role: 'user', createdAt: new Date()
            });
            showPage('home');
        } catch (error) {
            document.getElementById('registerError').innerText = error.message;
            document.getElementById('registerError').classList.remove('hidden');
        }
    }

    // تحديث واجهة المستخدم عند تغيير حالة المصادقة
    auth.onAuthStateChanged(user => {
        const userInfo = document.getElementById('userInfo');
        const navLinks = document.getElementById('navLinks');
        
        if (user) {
            // مستخدم مسجل دخول
            userInfo.innerHTML = `
                <span class="text-sm">${user.email}</span>
                <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded-lg text-sm hover:bg-red-600">
                    <i class="fas fa-sign-out-alt ml-1"></i> خروج
                </button>
            `;
            // يمكن إضافة روابط إضافية للمستخدم هنا
        } else {
            // مستخدم غير مسجل
            userInfo.innerHTML = `
                <a href="#" onclick="showPage('login')" class="hover:text-yellow-300 transition">
                    <i class="fas fa-sign-in-alt ml-1"></i> دخول
                </a>
                <a href="#" onclick="showPage('register')" class="hover:text-yellow-300 transition">
                    <i class="fas fa-user-plus ml-1"></i> تسجيل
                </a>
            `;
        }
    });

    function logout() {
        auth.signOut().then(() => showPage('home'));
    }
</script>

</body>
</html>
